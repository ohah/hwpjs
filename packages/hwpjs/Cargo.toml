# napi-rs용 패키지 (Node.js/Web)
[package]
name = "hwpjs-napi"
version.workspace = true
edition.workspace = true
authors.workspace = true
build = "build.rs"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.8.3"
napi-derive = "3.5.2"
hwp-core = { path = "../../crates/hwp-core" }
serde_json = "1.0.145"
base64 = "0.22.1"

[build-dependencies]
napi-build = "2.3.1"

[lints]
workspace = true

[profile.release]
lto = true
strip = "symbols"
codegen-units = 1
opt-level = "z"
panic = "unwind"
